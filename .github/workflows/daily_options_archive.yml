name: Daily Options CSV Archive

on:
  schedule:
    # Run at 4:00 PM EST (after market close)
    - cron: '0 21 * * 1-5'  # 21:00 UTC = 4:00 PM EST/EDT
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Commodity ticker (CT/KC/SB, blank = all)'
        required: false
        default: ''
      date:
        description: 'Date to process (YYYY-MM-DD, blank = process all existing)'
        required: false
        default: ''
      cleanup:
        description: 'Remove PDFs older than 7 days'
        required: true
        default: 'true'
      cleanup_days:
        description: 'Days to keep PDFs before cleanup'
        required: true
        default: '7'

env:
  PDF_DIR: ./data/pdfs
  CSV_DIR: ./data/csv

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do
            pip install pdfplumber pandas numpy && break || { echo "Retry $i..."; sleep 10; }
          done

      - name: Download new PDFs (if date specified)
        run: |
          mkdir -p ${{ env.PDF_DIR }}
          INPUT_DATE="${{ github.event.inputs.date }}"

          if [ -n "$INPUT_DATE" ]; then
            # Download specific date only
            DATE_FMT=$(echo $INPUT_DATE | tr '-' '_')
            echo "Downloading PDFs for date: $INPUT_DATE"
            for T in CT KC SB; do
              curl -L "https://github.com/${{ github.repository }}/raw/main/data/pdfs/${T}_${DATE_FMT}.pdf"                 -o "${{ env.PDF_DIR }}/${T}_${DATE_FMT}.pdf" || true
              curl -L "https://github.com/${{ github.repository }}/raw/main/data/pdfs/${T}_${DATE_FMT}-2.pdf"                 -o "${{ env.PDF_DIR }}/${T}_${DATE_FMT}-2.pdf" || true
            done
          else
            echo "No date specified - using existing PDFs from repo checkout"
          fi

          echo "PDFs in folder:"
          ls -la ${{ env.PDF_DIR }}/

      - name: Run archiver (process ALL existing PDFs)
        run: |
          # Handle empty inputs properly (GitHub may pass "" literally)
          RAW_TICKER='${{ github.event.inputs.ticker }}'
          TICKER=$(echo "$RAW_TICKER" | sed 's/^"//;s/"$//')

          RAW_CLEANUP='${{ github.event.inputs.cleanup }}'
          CLEANUP=$(echo "$RAW_CLEANUP" | sed 's/^"//;s/"$//')

          RAW_CLEANUP_DAYS='${{ github.event.inputs.cleanup_days }}'
          CLEANUP_DAYS=$(echo "$RAW_CLEANUP_DAYS" | sed 's/^"//;s/"$//')

          echo "Ticker=[$TICKER]"
          echo "Cleanup=[$CLEANUP]"
          echo "CleanupDays=[$CLEANUP_DAYS]"
          echo "Event=${{ github.event_name }}"

          export PYTHONUNBUFFERED=1

          # For scheduled runs OR when ticker is empty, process ALL commodities
          if [ -n "$TICKER" ] && [ "$TICKER" != "" ]; then
            echo "Processing single commodity: $TICKER"
            if [ "$CLEANUP" = "true" ]; then
              python options_csv_archiver_single.py                 --pdf-dir ${{ env.PDF_DIR }}                 --output-dir ${{ env.CSV_DIR }}                 --ticker "$TICKER"                 --cleanup                 --cleanup-days "$CLEANUP_DAYS"
            else
              python options_csv_archiver_single.py                 --pdf-dir ${{ env.PDF_DIR }}                 --output-dir ${{ env.CSV_DIR }}                 --ticker "$TICKER"
            fi
          else
            echo "Processing ALL commodities (CT, KC, SB)"
            if [ "$CLEANUP" = "true" ]; then
              python options_csv_archiver_single.py                 --pdf-dir ${{ env.PDF_DIR }}                 --output-dir ${{ env.CSV_DIR }}                 --cleanup                 --cleanup-days "$CLEANUP_DAYS"
            else
              python options_csv_archiver_single.py                 --pdf-dir ${{ env.PDF_DIR }}                 --output-dir ${{ env.CSV_DIR }}
            fi
          fi

      - name: Commit and push CSV archive
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add ${{ env.CSV_DIR }}/*_MASTER.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update options master CSVs: $(date +%Y-%m-%d)"
            git push
          fi
